version: "3.8"

services:
  postgres:
    container_name: postgres_db_mad_erp
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty@123
      POSTGRES_DB: mad_erp
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_HOST_AUTH_METHOD: trust

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5435:5432"
    networks:
      - postgres_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mad_erp"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  postgres_network:
    driver: bridge

volumes:
  postgres_data: